services:
  aegisphish-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: aegisphish-backend:latest
    environment:
      PORT: 8080
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  aegisphish-frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: aegisphish-frontend:latest
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    depends_on:
      - aegisphish-backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
