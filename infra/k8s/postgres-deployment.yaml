apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aegisphish-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegisphish-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegisphish-postgres
  template:
    metadata:
      labels:
        app: aegisphish-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: aegisphish
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegisphish-db-secret
                  key: postgres_password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: aegisphish-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: aegisphish-postgres
spec:
  selector:
    app: aegisphish-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
