name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
      - name: Install Go dependencies
        run: |
          cd backend
          go mod download
      - name: Run backend lint and test
        run: |
          cd backend
          go test ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend/app
          npm install
      - name: Build frontend
        run: |
          cd frontend/app
          npm run build
